<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Загрузка файла - Задание 14</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #28a745;
            padding-bottom: 10px;
        }

        .upload-form {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 8px;
            border: 2px dashed #28a745;
            text-align: center;
        }

        input[type="file"] {
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 4px;
            width: 80%;
        }

        input[type="submit"] {
            background: #28a745;
            color: white;
            cursor: pointer;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }

        input[type="submit"]:hover {
            background: #218838;
        }

        .info {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>

<body>
    <h2>Загрузка файла на сервер (Задание 14)</h2>

    <div class="upload-form">
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <p><b>Выберите файл для загрузки:</b></p>
            <input type="file" name="file" required>
            <br>
            <input type="submit" value="Загрузить на сервер">
        </form>
    </div>

    <div class="info">
        <p><b>Важно:</b></p>
        <ul>
            <li>Атрибут <code>enctype="multipart/form-data"</code> обязателен для загрузки файлов</li>
            <li>Без этого атрибута файл не будет отправлен корректно</li>
            <li>Файл сохранится в директорию <code>static/</code></li>
        </ul>
    </div>
</body>

</html>
