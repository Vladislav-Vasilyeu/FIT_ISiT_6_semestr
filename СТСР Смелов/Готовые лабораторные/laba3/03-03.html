<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Факториал</title>
</head>
<body>
    <div id="container-result"></div>
    <script>
        const result = document.getElementById('container-result');
        let n = 0;
        const d = Date.now();
        for (let k = 0; k < 21; k++) {
            fetch(`http://localhost:5000/fact?k=${k}`, {
                method: 'GET', mode: 'no-cors',
                headers: {'Content-Type': 'application/json', 'Accept': 'application/json'}
            })
            .then(res => {return res.json();})
            .then((pdata) => {
                result.innerHTML += (n++) + '.Результат: ' + (Date.now()-d) + '-' + pdata.k + '/' + pdata.fact + '<br/>';
            })
            
        }
    </script>
</body>
</html>
