<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Вход</title>
    <link rel="stylesheet" href="/public/style.css">
</head>
<body>
    <div class="container">
        <div class="icon">🔐</div>
        <h2>{{title}}</h2>
        <p>{{message}}</p>
        {{#if error}}
        <div class="alert alert-error">{{error}}</div>
        {{/if}}
        <form method="post" action="/login">
            <div class="form-group">
                <label>👤 Имя пользователя</label>
                <input type="text" name="username" required autofocus placeholder="Логин">
            </div>
            <div class="form-group">
                <label>🔒 Пароль</label>
                <input type="password" name="password" required placeholder="Пароль">
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <div class="info-card">
            <div class="info-item"><strong>📋 Тестовые данные:</strong></div>
            <div class="info-item">admin / password123</div>
            <div class="info-item">user1 / pass456</div>
        </div>
        <footer>© Лабораторная работа 21 • {{authType}}</footer>
    </div>
    <script src="/public/main.js"></script>
</body>
</html>
