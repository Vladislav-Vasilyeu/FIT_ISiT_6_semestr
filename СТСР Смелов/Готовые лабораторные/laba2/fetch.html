<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch</title>
</head>
<body>
    <h1>Факультет Информационных технологий</h1>
    <h1>3 курс</h1>
    <h1>1 группа</h1>
    <div id="name"></div>
    <button id="button" onclick="getData()">Получить данные</button>
    <script>
        function getData() {
            fetch('http://localhost:5000/api/name')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('name').innerHTML = data;
                })
                .catch(error => {
                    console.log(error);
                });
        }

    </script>
</body>

</html>
